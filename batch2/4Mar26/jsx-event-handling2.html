<body>

    <div id="root2"></div>
    <script type="text/babel">
        function handleTextChange(e) {
            // console.log(document.getElementById("d1").value);
            console.log(e.target.value);
            document.getElementById("d2").innerText = e.target.value
        }
        var jsx1 = <div>
            <input type="text" onKeyUp={(ev) => { handleTextChange(ev) }} />
            <h1 id='d2'></h1>
        </div>
        ReactDOM.render(jsx1, document.getElementById("root2"))

    </script>
</body>
