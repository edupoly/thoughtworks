<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <h1>Hello Gopasri</h1>
    <H1>Hello Uma</H1>
    <div id="root"></div>
    <div id="root2"></div>
    <script type="text/babel">
        var jsx1 = <h1 style={{ color: "orange" }}>Hello HemaSai</h1>
        ReactDOM.render(jsx1, document.getElementById("root2"))

        var el1 = React.createElement("h1", { style: { color: "green", fontFamily: "arial" } }, "Hello React Element")
        ReactDOM.render(el1, document.getElementById("root"))

        var jel1 = document.createElement("h1")
        jel1.innerText = "Hello DOM element";
        // jel1.style = { color: 'red', fontFamily: "arial" }
        jel1.style.color = "red";
        jel1.style.fontFamily = "verdana"
        document.body.appendChild(jel1)
    </script>
</body>

</html>
