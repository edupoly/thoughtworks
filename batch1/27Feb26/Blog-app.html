<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #d2 {
            background-color: cyan;
            width: 200px;
            height: 100px;
            padding: 20px;
            margin: 20px;
        }

        #posts {
            display: flex;
            flex-wrap: wrap;
            list-style: none;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        #posts li {
            width: 200px;
            padding: 20px;
            border: 1px solid gray;
            margin: 20px;
            border-radius: 10px;
        }

        #posts li img {
            width: 100%;
            height: 200px;
        }
    </style>
</head>

<body>

    <form onsubmit="addPost(event)">
        <input type="text" name="title" id="title" placeholder="Enter Title">
        <br>
        <textarea name="description" id="description" placeholder="Enter Description"></textarea>
        <br>
        <input type="text" name="thumbnail" id="thumbnail" placeholder="Enter Img Url">
        <br>
        <button>Add Todo</button>
    </form>
    <h1>Posts</h1>

    <ul id="posts"></ul>
    <script>
        function getAllPosts() {
            document.getElementById("posts").innerHTML = ""
            fetch("http://localhost:3000/posts")
                .then(res => res.json())
                .then(data => {
                    data.forEach((post) => {
                        var npost = `
                            <a href="post.html?pid=${post.id}">
                                <li>
                                    <img src=${post.thumbnail}>
                                    <h3>${post.title}</h3>
                                    <p>${post.description.slice(0, 50)}</p>
                                </li>
                            </a>
                        `
                        document.getElementById("posts").innerHTML += npost;
                    })
                })
        }
        function addPost(ev) {
            ev.preventDefault()
            fetch("http://localhost:3000/posts", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    title: document.getElementById("title").value,
                    description: document.getElementById("description").value,
                    thumbnail: document.getElementById("thumbnail").value,
                    comment: [],
                    likes: 0,
                    shares: 0
                })
            })
                .then(res => res.json())
                .then(data => {
                    getAllPosts()
                })
        }
        // function deleteTodo(id) {
        //     fetch(`http://localhost:3000/todos/${id}`, {
        //         method: "DELETE"
        //     })
        //         .then(() => {
        //             alert("Delete ipoindirooyyy...")
        //             getAllTodos();
        //         })
        // }
        getAllPosts();
    </script>
</body>

</html>
